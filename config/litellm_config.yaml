general_settings:
  store_model_in_db: true
  disable_end_user_cost_tracking: true

litellm_settings:
  num_retries: 3
  request_timeout: 3600
  allowed_fails: 5
  cooldown_time: 30
  drop_params: true
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD

model_list:

  # ─── Configuration ILaaS (endpoint AMUE — par défaut) ───────────────────────
  # Endpoint  : https://llm.ilaas.fr/v1
  # Clé       : ILAAS_API_KEY dans le .env
  # Modèle    : Mistral Medium 3 (mistral-medium-250523), hébergé CINES/ILaaS
  # Température recommandée : 0.1 ou inférieure
  # Pas d'embeddings RAG via ILaaS — utiliser Ollama + nomic-embed-text
  # (configurer dans OpenWebUI : Admin → Settings → Documents)

  - model_name: mistral-medium
    litellm_params:
      model: openai/mistral-medium-latest
      api_key: os.environ/ILAAS_API_KEY
      api_base: https://llm.ilaas.fr/v1
      temperature: 0.1
    model_info:
      max_tokens: 128000
      description: "Mistral Medium 3 — hébergé CINES/ILaaS (AMUE)"

  # ─── Option : clé Mistral standard (hors accord AMUE/ILaaS) ─────────────────
  # Si vous avez une clé Mistral classique (mistral.ai), vous avez accès à
  # l'ensemble des modèles. Commentez le bloc ILaaS ci-dessus et décommentez
  # les blocs suivants. Remplacez ILAAS_API_KEY par MISTRAL_API_KEY dans .env.
  # ────────────────────────────────────────────────────────────────────────────
  # - model_name: mistral-large
  #   litellm_params:
  #     model: mistral/mistral-large-latest
  #     api_key: os.environ/MISTRAL_API_KEY
  #     api_base: https://api.mistral.ai/v1
  #   model_info:
  #     max_tokens: 131072
  #     description: "Mistral Large — clé standard Mistral"
  #
  # - model_name: mistral-small
  #   litellm_params:
  #     model: mistral/mistral-small-latest
  #     api_key: os.environ/MISTRAL_API_KEY
  #     api_base: https://api.mistral.ai/v1
  #   model_info:
  #     max_tokens: 32768
  #     description: "Mistral Small — clé standard Mistral"
  #
  # - model_name: codestral
  #   litellm_params:
  #     model: mistral/codestral-latest
  #     api_key: os.environ/MISTRAL_API_KEY
  #     api_base: https://api.mistral.ai/v1
  #   model_info:
  #     max_tokens: 32768
  #     description: "Codestral — clé standard Mistral"
  #
  # - model_name: mistral-embed
  #   litellm_params:
  #     model: mistral/mistral-embed
  #     api_key: os.environ/MISTRAL_API_KEY
  #     api_base: https://api.mistral.ai/v1
  #   model_info:
  #     mode: embedding
  #     description: "Embeddings Mistral — clé standard Mistral (RAG)"

  # ─── Option : modèle local via Ollama (sans clé, pour tests) ────────────────
  # Sur Linux : remplacer host.docker.internal par l'IP de l'hôte (ex: 172.17.0.1)
  # Sur macOS : host.docker.internal fonctionne nativement avec Docker Desktop
  # - model_name: qwen3
  #   litellm_params:
  #     model: ollama/qwen3:0.6b
  #     api_base: http://host.docker.internal:11434
  #   model_info:
  #     description: "Qwen3 0.6b — modèle local via Ollama (sans clé)"
